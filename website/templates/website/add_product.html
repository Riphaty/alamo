{% extends 'website/base.html' %}
{% block content %}
{% include 'website/tool_bar.html' %}

<div class="content-container">
    <div class="sales-container">

        <form method="post" class="form-box">

            <h1>Add Product</h1>

            {% csrf_token %}

            <!-- NAME -->
            <label>Name:</label>
            <input type="text" name="name" required>

            <!-- CATEGORY -->
            <label>Category:</label>
            <select name="category" required>
                <option value="">Select a category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>

            <!-- CAPTION -->
            <label>Caption:</label>
            <textarea name="caption"></textarea>

            <!-- PRICE -->
            <label>Price:</label>
            <input type="number" name="price" step="500" min="0" required>

            <!-- MEDIA UPLOAD -->
            <label>Upload Media:</label>
            <input type="file" id="images" accept=".jpg,.jpeg,.png,.webp,.mp4,.webm" multiple>

            <!-- AVAILABLE -->
            <label>Available:</label>
            <input style="width:1.5rem;height:1.5rem;" type="checkbox" name="is_available" checked>

            <!-- HIDDEN FIELD FOR DJANGO -->
            <input type="hidden" name="media_data" id="media_data">

            <br><br>

            <button type="submit" class="action edit-btn">Add Product</button>

        </form>

    </div>
</div>


<!-- ===================== -->
<!-- CLOUDINARY UPLOAD -->
<!-- ===================== -->
<script>
async function uploadToCloudinary(file) {

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "YOUR_PRESET");

    const res = await fetch(
        "https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/upload",
        {
            method: "POST",
            body: formData
        }
    );

    return await res.json();
}


// HANDLE FILE UPLOAD
document.getElementById("images").addEventListener("change", async function (e) {

    const files = e.target.files;

    if (!files.length) return;

    let uploadedMedia = [];

    for (let file of files) {

        const data = await uploadToCloudinary(file);

        uploadedMedia.push({
            url: data.secure_url,
            type: data.resource_type,
            public_id: data.public_id
        });
    }

    window.productMedia = uploadedMedia;

    console.log("Uploaded media:", uploadedMedia);
});


// ATTACH MEDIA TO FORM BEFORE SUBMIT
document.querySelector("form").addEventListener("submit", function () {

    if (window.productMedia) {
        document.getElementById("media_data").value =
            JSON.stringify(window.productMedia);
    }
});
</script>

{% endblock %}
