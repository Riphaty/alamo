{% extends 'website/base.html' %}
{% block content %}
{% include 'website/tool_bar.html' %}

<div class="content-container">
    <div class="sales-container">
        <form method="post" enctype="multipart/form-data" class="form-box">
            
            <h1>Add Product</h1>

            {% csrf_token %}

            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="">Select a category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>

            <label for="caption">Caption:</label>
            <textarea id="description" name="caption"></textarea>

            <label for="price">Price:</label>
            <input type="number" id="price" name="price" step="500" min="0" required>

            <!-- 🔧 FIXED PART ONLY -->
            <label for="images">Upload Media:</label>
            <input type="file" id="images" name="images" accept=".jpg,.jpeg,.png,.webp,.mp4,.webm" multiple>

            <label for="is_available">Available:</label>
            <input style="width: 1.5rem; height: 1.5rem;" type="checkbox" id="is_available" name="is_available" checked>

            <input type="submit" value="Add Product" class="action edit-btn">

        </form>
    </div>
</div>

{% endblock %}
